<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body{
    margin:0;
    font-family:Segoe UI;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
}

.card{
    width:320px;
    padding:25px;
    background:white;
    border-radius:12px;
}

input, button {
    box-sizing: border-box; /* Dòng này cực kỳ quan trọng */
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: 1px solid #ddd; /* Thêm border cho đẹp */
    border-radius: 6px;
}

button {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

.login{ background:#3b82f6; color:white; }
.link{ margin-top:10px; text-align:center; cursor:pointer; color:#3b82f6; }
</style>
</head>

<body>

<div class="card">
    <h2>🔐 Login</h2>

    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">

    <button class="login" onclick="login()">Login</button>

    <div class="link" onclick="goRegister()">Register</div>
</div>

<script>
function login(){
    fetch('/api/login',{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            username:username.value,
            password:password.value
        })
    })
    .then(r=>r.json())
    .then(u=>{
        localStorage.setItem("user",JSON.stringify(u));
        location.href="index.html";
    })
    .catch(()=>alert("Sai login"));
}

function goRegister(){
    location.href="register.html";
}
</script>

</body>
</html>
