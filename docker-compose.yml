version: "3.8"

services:
  db:
    # Bản ổn định kéo từ Docker Hub
    image: giahieu33271/shop-db:1.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: shopdb
    volumes:
      # Không dùng mount file sql local nữa vì code/data đã đóng gói trong image db:1.0
      - db_data:/var/lib/mysql
    networks:
      - app-net
    labels:
      owner: "${OWNER}"

  backend:
    # Bản ổn định kéo từ Docker Hub
    image: giahieu33271/shop-backend:1.0
    expose:
      - "5000"
    restart: always
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: shopdb
    networks:
      - app-net
    labels:
      owner: "${OWNER}"

  web:
    # Bản ổn định kéo từ Docker Hub
    image: giahieu33271/shop-web:1.0
    restart: always
    depends_on:
      - backend
    networks:
      - app-net
    labels:
      owner: "${OWNER}"

networks:
  app-net:
    # Đảm bảo network tách biệt giữa các lần deploy khác nhau
    name: ${COMPOSE_PROJECT_NAME}_app-net
    driver: bridge

volumes:
  db_data:
    # Volume được định danh theo project để không bị lẫn dữ liệu
    name: ${COMPOSE_PROJECT_NAME}_db_data