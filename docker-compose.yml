version: "3.8"

services:
  db:
    image: giahieu33271/shop-db:1.0
    container_name: shop-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: shopdb
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - shop-net

  backend:
    image: giahieu33271/shop-backend:1.0
    container_name: shop-backend
    restart: always
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: shopdb
    networks:
      - shop-net

  web:
    image: giahieu33271/shop-web:1.0
    container_name: shop-web
    restart: always
    ports:
      - "8090:80"
    depends_on:
      - backend
    networks:
      - shop-net

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: shop-phpmyadmin
    restart: always
    ports:
      - "8091:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - db
    networks:
      - shop-net

networks:
  shop-net:
    driver: bridge

volumes:
  db_data:
